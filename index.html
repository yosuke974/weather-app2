<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り天気予報</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #03080f;
  --bg2:      #071220;
  --bg3:      #0c1e35;
  --border:   #1a3a5c;
  --sea:      #0e6da8;
  --wave:     #3aa0e0;
  --foam:     #7ec8f0;
  --text:     #d8eaf8;
  --muted:    #5a8ab0;
  --good:     #2ecc8a;
  --caution:  #f0a830;
  --danger:   #e84040;
  --white:    #eef6ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  font-size: 13px;
}

/* ─── HEADER ─── */
header {
background: linear-gradient(180deg, #071a2e 0%, var(–bg) 100%);
padding: 28px 16px 20px;
text-align: center;
border-bottom: 1px solid var(–border);
position: sticky; top: 0; z-index: 100;
}
.hdr-eye { font-size: 9px; letter-spacing: 6px; color: var(–wave); opacity: .7; margin-bottom: 6px; }
.hdr-title {
font-family: ‘Shippori Mincho’, serif;
font-size: clamp(22px,5vw,38px);
font-weight: 800;
letter-spacing: 5px;
color: var(–white);
}
.hdr-title em { color: var(–wave); font-style: normal; }
.hdr-sub { font-size: 9px; color: var(–muted); letter-spacing: 2px; margin-top: 6px; }
.hdr-ts  { font-size: 9px; color: var(–muted); opacity: .5; margin-top: 3px; }

/* ─── SPOT TABS ─── */
.tab-row {
display: flex;
background: var(–bg2);
border-bottom: 1px solid var(–border);
position: sticky; top: 105px; z-index: 90;
}
.tab-btn {
flex: 1; padding: 12px 4px;
background: none; border: none; border-bottom: 2px solid transparent;
color: var(–muted); cursor: pointer;
font-family: ‘Shippori Mincho’, serif;
font-size: 15px; letter-spacing: 2px;
transition: all .25s;
}
.tab-btn span { display:block; font-family:‘JetBrains Mono’,monospace; font-size:8px; opacity:.5; margin-top:2px; }
.tab-btn.active { color: var(–white); border-bottom-color: var(–wave); background: #0c1e3588; }

/* ─── PANELS ─── */
.panel { display: none; padding: 0 0 60px; }
.panel.active { display: block; }

/* ─── TODAY CARD ─── */
.today-card {
margin: 14px 12px;
background: linear-gradient(135deg, #0a2040, #0d3060);
border: 1px solid var(–wave);
border-radius: 14px;
padding: 16px;
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 10px;
}
.today-cond {
grid-column: 1/-1;
display: flex; align-items: center; gap: 10px;
padding-bottom: 10px;
border-bottom: 1px solid #ffffff12;
}
.cond-badge {
padding: 5px 14px; border-radius: 20px;
font-size: 13px; font-weight: 700; letter-spacing: 1px;
}
.cond-badge.good    { background:#2ecc8a22; color:var(–good);    border:1px solid #2ecc8a55; }
.cond-badge.caution { background:#f0a83022; color:var(–caution); border:1px solid #f0a83055; }
.cond-badge.danger  { background:#e8404022; color:var(–danger);  border:1px solid #e8404055; }
.cond-label { font-size: 10px; color: var(–muted); }
.today-stat { text-align: center; }
.today-stat .lbl { font-size: 8px; color: var(–muted); letter-spacing:1px; margin-bottom:3px; }
.today-stat .val { font-size: 20px; font-weight:700; color: var(–white); line-height:1; }
.today-stat .unit { font-size: 10px; color: var(–muted); margin-left:1px; }

/* ─── DATE TABS ─── */
.date-scroll {
overflow-x: auto; padding: 0 12px;
display: flex; gap: 6px;
scrollbar-width: none;
margin-bottom: 12px;
}
.date-scroll::-webkit-scrollbar { display:none; }
.date-tab {
flex-shrink: 0;
background: var(–bg3); border: 1px solid var(–border);
border-radius: 8px; padding: 7px 12px;
cursor: pointer; text-align: center;
transition: all .2s;
min-width: 56px;
}
.date-tab.active { background: var(–sea); border-color: var(–wave); }
.date-tab.good    { border-top: 3px solid var(–good); }
.date-tab.caution { border-top: 3px solid var(–caution); }
.date-tab.danger  { border-top: 3px solid var(–danger); }
.date-tab .dt-date { font-size: 9px; color: var(–muted); margin-bottom:2px; }
.date-tab .dt-day  { font-family:‘Shippori Mincho’,serif; font-size:16px; font-weight:700; }
.date-tab .dt-day.sun { color:#f9d060; }
.date-tab .dt-day.sat { color:#80aaff; }
.date-tab .dt-cond { font-size: 8px; margin-top:3px; }

/* ─── HOURLY TABLE ─── */
.section-lbl {
font-size: 9px; letter-spacing:3px; color:var(–muted);
padding: 0 12px 8px; opacity:.7;
}
.hourly-wrap { padding: 0 12px; }
.hourly-row {
display: grid;
grid-template-columns: 46px 1fr 1fr 1fr 1fr;
gap: 4px; align-items: center;
padding: 9px 10px;
border-radius: 8px;
margin-bottom: 3px;
border-left: 3px solid transparent;
background: var(–bg2);
transition: background .15s;
}
.hourly-row:hover { background: #0c2040; }
.hourly-row.good    { border-left-color: var(–good); }
.hourly-row.caution { border-left-color: var(–caution); }
.hourly-row.danger  { border-left-color: var(–danger); }
.hourly-row.header-row {
background: transparent;
border-left-color: transparent;
padding: 4px 10px 6px;
margin-bottom: 2px;
}
.col-time  { font-size: 13px; font-weight:700; color: var(–white); }
.col-hdr   { font-size: 8px; color: var(–muted); letter-spacing:1px; text-align:center; }
.col-wind  { text-align:center; }
.col-wave  { text-align:center; }
.col-wx    { text-align:center; }
.col-cond  { text-align:center; }
.wind-spd  { font-size:14px; font-weight:700; }
.wind-dir  { font-size:9px; color:var(–muted); margin-top:1px; }
.wave-h    { font-size:14px; font-weight:700; }
.wave-p    { font-size:9px; color:var(–muted); margin-top:1px; }
.wx-icon   { font-size:18px; }
.est-mark  { font-size:8px; color:var(–caution); opacity:.7; }

.cond-dot {
display:inline-block;
width:10px; height:10px; border-radius:50%;
}
.cond-dot.good    { background: var(–good); box-shadow:0 0 6px var(–good); }
.cond-dot.caution { background: var(–caution); box-shadow:0 0 6px var(–caution); }
.cond-dot.danger  { background: var(–danger); box-shadow:0 0 6px var(–danger); }

/* ─── NOTICE ─── */
.notice {
margin: 10px 12px;
padding: 8px 12px;
background: #f0a83010;
border: 1px solid #f0a83040;
border-radius: 8px;
font-size: 10px;
color: var(–caution);
line-height: 1.7;
}

/* ─── LEGEND ─── */
.legend {
display:flex; gap:12px; flex-wrap:wrap; align-items:center;
margin: 12px 12px 0;
padding: 8px 12px;
background: var(–bg2);
border-radius: 8px; border:1px solid var(–border);
}
.legend-item { display:flex; align-items:center; gap:5px; font-size:9px; color:var(–muted); }
.legend-dot { width:7px; height:7px; border-radius:50%; }

/* ─── LOADING / ERROR ─── */
.loading { text-align:center; padding:60px 20px; color:var(–muted); }
.ld-dots { display:inline-flex; gap:5px; margin-bottom:14px; }
.ld-dots span {
width:7px; height:7px; background:var(–wave); border-radius:50%;
animation: ld 1.2s ease-in-out infinite;
}
.ld-dots span:nth-child(2){animation-delay:.2s}
.ld-dots span:nth-child(3){animation-delay:.4s}
@keyframes ld { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-8px);opacity:1} }
.error-msg { text-align:center; padding:40px; color:var(–caution); line-height:1.8; }
.api-note { font-size:8px; color:#ffffff18; text-align:center; letter-spacing:1px; padding: 16px 12px 0; }
</style>

</head>
<body>

<header>
  <div class="hdr-eye">⚓ SEA FISHING FORECAST</div>
  <div class="hdr-title">海上<em>釣り</em>予報</div>
  <div class="hdr-sub">OBAMA · AKASHI · MINAMI-ISE — 2時間毎 14日間予報</div>
  <div class="hdr-ts" id="timestamp">取得中...</div>
</header>

<div class="tab-row">
  <button class="tab-btn active" onclick="switchSpot(0)">小浜<span>OBAMA · FUKUI</span></button>
  <button class="tab-btn" onclick="switchSpot(1)">明石<span>AKASHI · HYOGO</span></button>
  <button class="tab-btn" onclick="switchSpot(2)">南伊勢<span>MINAMI-ISE · MIE</span></button>
</div>

<div id="panel-0" class="panel active"><div class="loading"><div class="ld-dots"><span></span><span></span><span></span></div><div>海上データ取得中...</div></div></div>
<div id="panel-1" class="panel"><div class="loading"><div class="ld-dots"><span></span><span></span><span></span></div><div>海上データ取得中...</div></div></div>
<div id="panel-2" class="panel"><div class="loading"><div class="ld-dots"><span></span><span></span><span></span></div><div>海上データ取得中...</div></div></div>

<script>
const SPOTS = [
  { name:'小浜', lat:35.65,   lon:135.60,  note:'若狭湾（湾中央沖）', fScale:0.80, pScale:0.85 },
  { name:'明石', lat:34.6451, lon:134.9983, note:'播磨灘・明石海峡',   fScale:0.50, pScale:0.65 },
  { name:'南伊勢', lat:34.3822, lon:136.7111, note:'熊野灘・伊勢湾口', fScale:0.85, pScale:0.90 },
];

const WMO = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
  45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',
  61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',
  80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️',
};
const WDIRS = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
const WARROWS = ['↓','↙','←','↖','↑','↗','→','↘'];
const toDir   = d => WDIRS[Math.round(d/22.5)%16];
const toArrow = d => WARROWS[Math.round(((d+180)%360)/45)%8];
const cond    = (w,h) => w>10||h>2?'danger':w>6||h>1?'caution':'good';
const condJa  = c => c==='good'?'良好':c==='caution'?'注意':'危険';
const estWave = (w,s) => Math.round(0.025*w*w*s*10)/10;
const estPer  = (h,s) => Math.round(4.4*Math.sqrt(Math.max(h,0.1))*s*10)/10;

const DAY_NAMES = ['日','月','火','水','木','金','土'];
function dayInfo(dt){ const d=new Date(dt+'T00:00:00'); return {name:DAY_NAMES[d.getDay()],dow:d.getDay()}; }
function fmtMD(dt){ const d=new Date(dt+'T00:00:00'); return `${d.getMonth()+1}/${d.getDate()}`; }

// 各スポットのデータ・選択日インデックス
const state = SPOTS.map(()=>({ data:null, selDay:0 }));

async function fetchSpot(idx){
  const s = SPOTS[idx];
  const base = `latitude=${s.lat}&longitude=${s.lon}&timezone=Asia%2FTokyo&forecast_days=14`;
  const wUrl = `https://api.open-meteo.com/v1/forecast?${base}`
    +`&hourly=weather_code,wind_speed_10m,wind_direction_10m&wind_speed_unit=ms`;
  const mUrl = `https://marine-api.open-meteo.com/v1/marine?${base}`
    +`&hourly=wave_height,wave_period`;
  try {
    const [wRes,mRes] = await Promise.all([fetch(wUrl),fetch(mUrl)]);
    if(!wRes.ok) return null;
    const [wData,mData] = await Promise.all([wRes.json(), mRes.ok?mRes.json():Promise.resolve(null)]);
    if(wData.error) return null;
    let marineOk = false;
    if(mData && !mData.error && mData.hourly?.wave_height){
      marineOk = mData.hourly.wave_height.some(v=>v!=null&&v>0);
    }
    return { w:wData, m:marineOk?mData:null, marineOk };
  } catch(e){ return null; }
}

function getWave(data, idx, spot){
  if(data.marineOk && data.m?.hourly?.wave_height?.[idx]!=null)
    return data.m.hourly.wave_height[idx] ?? 0;
  return estWave(data.w.hourly.wind_speed_10m?.[idx]??0, spot.fScale);
}
function getPeriod(data, idx, spot){
  if(data.marineOk && data.m?.hourly?.wave_period?.[idx]!=null)
    return data.m.hourly.wave_period[idx] ?? 0;
  return estPer(getWave(data,idx,spot), spot.pScale);
}

// 14日分の日付リストを作る
function getDays(times){
  const seen = new Set(), days = [];
  times.forEach((t,i)=>{
    const d = t.slice(0,10);
    if(!seen.has(d)){ seen.add(d); days.push({date:d, startIdx:i}); }
  });
  return days;
}

// 1日のサマリ（日最大風速・波高）
function daySummary(data, spot, startIdx){
  let maxW=0, maxH=0;
  for(let i=startIdx; i<startIdx+24 && i<data.w.hourly.time.length; i++){
    maxW = Math.max(maxW, data.w.hourly.wind_speed_10m?.[i]??0);
    maxH = Math.max(maxH, getWave(data,i,spot));
  }
  return { maxW, maxH, cond:cond(maxW,maxH) };
}

function buildPanel(spotIdx, data){
  const panel = document.getElementById(`panel-${spotIdx}`);
  const spot  = SPOTS[spotIdx];
  if(!data){
    panel.innerHTML=`<div class="error-msg">⚠ データの取得に失敗しました。<br>インターネット接続を確認してください。</div>`;
    return;
  }
  state[spotIdx].data = data;
  renderPanel(spotIdx);
}

function renderPanel(spotIdx){
  const panel = document.getElementById(`panel-${spotIdx}`);
  const data  = state[spotIdx].data;
  const selDay= state[spotIdx].selDay;
  const spot  = SPOTS[spotIdx];
  const times = data.w.hourly.time;
  const days  = getDays(times);

  // ── TODAY CARD (常に今日) ──
  const now = new Date();
  const nowHour = now.getHours();
  // 今日の現在時刻に近いインデックス
  const todayIdx = days[0].startIdx + nowHour;
  const todayW  = data.w.hourly.wind_speed_10m?.[todayIdx]??0;
  const todayDir= data.w.hourly.wind_direction_10m?.[todayIdx]??0;
  const todayH  = getWave(data, todayIdx, spot);
  const todayP  = getPeriod(data, todayIdx, spot);
  const todayCnd= cond(todayW, todayH);

  let html = `
  <div class="today-card">
    <div class="today-cond">
      <span class="cond-badge ${todayCnd}">${condJa(todayCnd)}</span>
      <span class="cond-label">本日 現在のコンディション — ${spot.note}</span>
    </div>
    <div class="today-stat"><div class="lbl">風速</div><div class="val">${todayW.toFixed(1)}<span class="unit">m/s</span></div></div>
    <div class="today-stat"><div class="lbl">風向</div><div class="val" style="font-size:16px">${toArrow(todayDir)} ${toDir(todayDir)}</div></div>
    <div class="today-stat"><div class="lbl">${data.marineOk?'波高':'波高(推定)'}</div><div class="val" style="${!data.marineOk?'color:var(--caution)':''}">${todayH.toFixed(1)}<span class="unit">m</span></div></div>
    <div class="today-stat"><div class="lbl">${data.marineOk?'波周期':'波周期(推定)'}</div><div class="val" style="${!data.marineOk?'color:var(--caution)':''}">${todayP.toFixed(0)}<span class="unit">s</span></div></div>
    <div class="today-stat"><div class="lbl">時刻</div><div class="val" style="font-size:15px">${String(nowHour).padStart(2,'0')}:00</div></div>
  </div>`;

  if(!data.marineOk){
    html += `<div class="notice">⚠ この海域はMarine APIの対象外のため、波高・波周期は風速からの<strong>推定値</strong>です。出港前に気象庁等でご確認ください。</div>`;
  }

  // ── DATE TABS ──
  html += `<div class="date-scroll">`;
  days.forEach((day, di)=>{
    const { name, dow } = dayInfo(day.date);
    const sum = daySummary(data, spot, day.startIdx);
    const dowCls = dow===0?'sun':dow===6?'sat':'';
    html += `<div class="date-tab ${sum.cond} ${di===selDay?'active':''}" onclick="selectDay(${spotIdx},${di})">
      <div class="dt-date">${fmtMD(day.date)}</div>
      <div class="dt-day ${dowCls}">${name}</div>
      <div class="dt-cond">${sum.cond==='good'?'🟢':sum.cond==='caution'?'🟡':'🔴'}</div>
    </div>`;
  });
  html += `</div>`;

  // ── HOURLY TABLE (2時間毎) ──
  const day = days[selDay];
  html += `<div class="section-lbl">${fmtMD(day.date)} の2時間毎予報</div>`;
  html += `<div class="hourly-wrap">`;

  // ヘッダー行
  html += `<div class="hourly-row header-row">
    <div class="col-time col-hdr">時刻</div>
    <div class="col-wind col-hdr">風速<br>風向</div>
    <div class="col-wave col-hdr">波高<br>周期</div>
    <div class="col-wx col-hdr">天気</div>
    <div class="col-cond col-hdr">状況</div>
  </div>`;

  for(let h=0; h<24; h+=2){
    const i = day.startIdx + h;
    if(i >= times.length) break;
    const ws  = data.w.hourly.wind_speed_10m?.[i]??0;
    const wd  = data.w.hourly.wind_direction_10m?.[i]??0;
    const wh  = getWave(data,i,spot);
    const wp  = getPeriod(data,i,spot);
    const wmo = data.w.hourly.weather_code?.[i]??0;
    const c   = cond(ws,wh);
    const wColor = c==='good'?'var(--good)':c==='caution'?'var(--caution)':'var(--danger)';
    const mColor = wh>2?'var(--danger)':wh>1?'var(--caution)':'var(--wave)';
    const isNow = (selDay===0 && h===Math.floor(nowHour/2)*2);

    html += `<div class="hourly-row ${c}" style="${isNow?'background:#0e2a48;outline:1px solid var(--wave)':''}">
      <div class="col-time" style="${isNow?'color:var(--wave)':''}">
        ${String(h).padStart(2,'0')}:00
        ${isNow?'<div style="font-size:8px;color:var(--wave)">NOW</div>':''}
      </div>
      <div class="col-wind">
        <div class="wind-spd" style="color:${wColor}">${ws.toFixed(1)}<span style="font-size:9px;color:var(--muted)">m/s</span></div>
        <div class="wind-dir">${toArrow(wd)} ${toDir(wd)}</div>
      </div>
      <div class="col-wave">
        <div class="wave-h" style="color:${mColor}">${wh.toFixed(1)}<span style="font-size:9px;color:var(--muted)">m</span></div>
        <div class="wave-p">${wp.toFixed(0)}s${!data.marineOk?'<span class="est-mark"> 推定</span>':''}</div>
      </div>
      <div class="col-wx"><span class="wx-icon">${WMO[wmo]||'🌤️'}</span></div>
      <div class="col-cond"><span class="cond-dot ${c}"></span></div>
    </div>`;
  }
  html += `</div>`;

  // ── LEGEND ──
  html += `<div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:var(--good)"></span>良好 風≤6m/s 波≤1m</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--caution)"></span>注意 風≤10m/s 波≤2m</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--danger)"></span>危険 風>10m/s 波>2m</div>
  </div>
  <div class="api-note">データ: Open-Meteo / Marine API — 30分毎自動更新</div>`;

  panel.innerHTML = html;
}

function selectDay(spotIdx, dayIdx){
  state[spotIdx].selDay = dayIdx;
  renderPanel(spotIdx);
}

function switchSpot(idx){
  document.querySelectorAll('.tab-btn').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}

async function loadAll(){
  document.getElementById('timestamp').textContent =
    `最終更新: ${new Date().toLocaleString('ja-JP')}`;
  const results = await Promise.all(SPOTS.map((_,i)=>fetchSpot(i)));
  results.forEach((d,i)=>buildPanel(i,d));
}

loadAll();
setInterval(loadAll, 30*60*1000);
</script>

</body>
</html>

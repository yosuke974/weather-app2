<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>釣り天気予報 — 海上コンディション</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sea-deep: #0d2b45;
    --sea-mid: #1a4a6e;
    --wave: #5aace0;
    --foam: #a8d4f0;
    --silver: #c8d8e8;
    --white: #f0f6fc;
    --danger: #e85a4b;
    --caution: #e8a84b;
    --good: #4be89a;
    --bg: #050e1c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .waves-bg {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 200px; z-index: 0;
    opacity: 0.12; pointer-events: none;
  }
  .waves-bg svg { width: 200%; height: 100%; animation: wave-drift 12s linear infinite; }
  @keyframes wave-drift { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

header {
position: relative; z-index: 10;
padding: 36px 20px 20px;
text-align: center;
border-bottom: 1px solid #ffffff15;
}
.header-label { font-size: 10px; letter-spacing: 5px; color: var(–wave); margin-bottom: 8px; }
h1 {
font-family: ‘Shippori Mincho’, serif;
font-size: clamp(26px, 6vw, 48px);
font-weight: 800; letter-spacing: 4px;
text-shadow: 0 0 40px #2d7ab555;
}
h1 span { color: var(–wave); }
.subtitle { font-size: 10px; color: var(–silver); letter-spacing: 2px; margin-top: 8px; opacity: 0.7; }
.timestamp { font-size: 10px; color: var(–foam); margin-top: 5px; opacity: 0.45; }

.spots-nav {
position: relative; z-index: 10;
display: flex; justify-content: center;
padding: 28px 16px 0;
}
.spot-tab {
background: none;
border: 1px solid #ffffff20; border-right: none;
color: var(–silver);
font-family: ‘Shippori Mincho’, serif;
font-size: 15px; font-weight: 600;
padding: 10px 20px; cursor: pointer;
transition: all 0.3s; letter-spacing: 2px;
}
.spot-tab:first-child { border-radius: 8px 0 0 0; }
.spot-tab:last-child { border-right: 1px solid #ffffff20; border-radius: 0 8px 0 0; }
.spot-tab.active { background: var(–sea-mid); color: var(–white); border-color: var(–wave); border-bottom-color: transparent; }
.spot-tab:hover:not(.active) { background: #ffffff08; }
.spot-subtitle { display: block; font-size: 8px; font-family: ‘Space Mono’,monospace; color: var(–foam); opacity: 0.55; letter-spacing: 1px; margin-top: 2px; }

.content { position: relative; z-index: 10; padding: 0 12px 40px; max-width: 1200px; margin: 0 auto; }
.spot-panel { display: none; }
.spot-panel.active { display: block; }

/* 推定値の注意バナー */
.estimate-notice {
background: #e8a84b11;
border: 1px solid #e8a84b44;
border-radius: 6px;
padding: 8px 12px;
font-size: 10px;
color: var(–caution);
margin-bottom: 14px;
line-height: 1.6;
}

.current-banner {
background: linear-gradient(135deg, var(–sea-deep), var(–sea-mid));
border: 1px solid var(–wave); border-top: none;
border-radius: 0 0 12px 12px;
padding: 16px 20px;
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 12px; margin-bottom: 14px;
}
@media (min-width: 500px) { .current-banner { grid-template-columns: repeat(6, 1fr); } }
.current-item { text-align: center; }
.current-label { font-size: 8px; letter-spacing: 1px; color: var(–foam); opacity: 0.55; margin-bottom: 3px; }
.current-value { font-size: 18px; font-weight: 700; }
.current-unit { font-size: 10px; color: var(–foam); opacity: 0.65; }

.section-header { display: flex; align-items: center; gap: 10px; margin: 20px 0 12px; }
.section-title { font-family: ‘Shippori Mincho’,serif; font-size: 16px; font-weight: 600; color: var(–foam); letter-spacing: 3px; }
.section-line { flex: 1; height: 1px; background: linear-gradient(to right,#ffffff20,transparent); }

.forecast-scroll { overflow-x: auto; padding-bottom: 8px; }
.forecast-grid { display: flex; gap: 4px; min-width: max-content; }

.forecast-day {
background: #ffffff07;
border: 1px solid #ffffff12;
border-radius: 8px; padding: 10px 8px;
text-align: center; width: 76px; flex-shrink: 0;
transition: all 0.2s;
}
.forecast-day:hover { background: #ffffff10; transform: translateY(-2px); }
.forecast-day.good { border-top: 3px solid var(–good); }
.forecast-day.caution { border-top: 3px solid var(–caution); }
.forecast-day.danger { border-top: 3px solid var(–danger); }

.day-date { font-size: 9px; color: var(–foam); opacity: 0.45; margin-bottom: 1px; }
.day-name { font-family: ‘Shippori Mincho’,serif; font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.day-name.sun { color: #ffcc66; }
.day-name.sat { color: #88aaff; }
.weather-icon { font-size: 18px; display: block; margin-bottom: 5px; }
.wind-value { font-size: 13px; font-weight: 700; margin-bottom: 1px; }
.wind-dir { font-size: 9px; color: var(–foam); opacity: 0.55; margin-bottom: 5px; }
.wave-value { font-size: 11px; font-weight: 700; border-top: 1px solid #ffffff10; padding-top: 5px; }
.wave-period { font-size: 9px; color: var(–foam); opacity: 0.45; margin-top: 2px; }
.wave-estimated { font-size: 7px; color: var(–caution); opacity: 0.7; margin-top: 1px; }

.condition-badge {
font-size: 7px; letter-spacing: 0.5px;
padding: 2px 4px; border-radius: 3px; margin-top: 4px; display: inline-block;
}
.badge-good { background:#4be89a18; color:var(–good); border:1px solid #4be89a33; }
.badge-caution { background:#e8a84b18; color:var(–caution); border:1px solid #e8a84b33; }
.badge-danger { background:#e85a4b18; color:var(–danger); border:1px solid #e85a4b33; }

.legend {
display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
margin-top: 14px; padding: 8px 12px;
background: #ffffff04; border-radius: 6px; border: 1px solid #ffffff0e;
}
.legend-title { font-size: 8px; letter-spacing: 2px; color: var(–foam); opacity: 0.45; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(–silver); opacity: 0.65; }
.legend-dot { width: 7px; height: 7px; border-radius: 2px; }

.loading { text-align: center; padding: 50px 20px; color: var(–foam); opacity: 0.6; }
.loading-wave { display: inline-flex; gap: 4px; margin-bottom: 14px; }
.loading-wave span {
width: 6px; height: 6px; background: var(–wave);
border-radius: 50%; animation: lb 1.2s ease-in-out infinite;
}
.loading-wave span:nth-child(2){animation-delay:.2s}
.loading-wave span:nth-child(3){animation-delay:.4s}
@keyframes lb { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-8px);opacity:1} }

.error-msg { text-align: center; padding: 40px 20px; color: var(–caution); font-size: 12px; line-height: 1.8; }
.info-bar { font-size: 9px; color: var(–foam); opacity: 0.35; margin-top: 6px; text-align: right; }
.api-note { margin-top: 10px; font-size: 8px; color: #ffffff25; letter-spacing: 1px; text-align: center; }
</style>

</head>
<body>

<div class="waves-bg">
  <svg viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,80 C180,20 360,140 540,80 C720,20 900,140 1080,80 C1260,20 1440,140 1440,80 L1440,200 L0,200 Z" fill="#2d7ab5" opacity="0.6"/>
    <path d="M0,110 C200,50 400,160 600,100 C800,40 1000,160 1200,100 C1350,55 1440,110 1440,110 L1440,200 L0,200 Z" fill="#1a4a6e" opacity="0.6"/>
    <path d="M720,80 C900,20 1080,140 1260,80 C1440,20 1620,140 1800,80 C1980,20 2160,140 2160,80 L2160,200 L720,200 Z" fill="#2d7ab5" opacity="0.4"/>
    <path d="M720,110 C920,50 1120,160 1320,110 C1520,65 1720,170 1920,110 C2120,55 2160,120 2160,120 L2160,200 L720,200 Z" fill="#1a4a6e" opacity="0.35"/>
  </svg>
</div>

<header>
  <div class="header-label">⚓ SEA FISHING FORECAST</div>
  <h1>海上<span>釣り</span>予報</h1>
  <div class="subtitle">OBAMA · AKASHI · MINAMI-ISE — 14日間海上コンディション</div>
  <div class="timestamp" id="timestamp">データ取得中...</div>
</header>

<div class="spots-nav">
  <button class="spot-tab active" onclick="switchSpot(0)">
    小浜<span class="spot-subtitle">OBAMA·FUKUI</span>
  </button>
  <button class="spot-tab" onclick="switchSpot(1)">
    明石<span class="spot-subtitle">AKASHI·HYOGO</span>
  </button>
  <button class="spot-tab" onclick="switchSpot(2)">
    南伊勢<span class="spot-subtitle">MINAMI-ISE·MIE</span>
  </button>
</div>

<div class="content">
  <div class="spot-panel active" id="panel-0"><div class="loading"><div class="loading-wave"><span></span><span></span><span></span></div><div>海上データ取得中...</div></div></div>
  <div class="spot-panel" id="panel-1"><div class="loading"><div class="loading-wave"><span></span><span></span><span></span></div><div>海上データ取得中...</div></div></div>
  <div class="spot-panel" id="panel-2"><div class="loading"><div class="loading-wave"><span></span><span></span><span></span></div><div>海上データ取得中...</div></div></div>
</div>

<script>
const SPOTS = [
  {
    name: '小浜', lat: 35.4963, lon: 135.7469, note: '若狭湾',
    // 内湾のためMarine APIが使えない場合の吹送距離(km)と係数
    // 若狭湾: 湾の奥行き約40km、やや閉じた湾
    fetchScale: 0.55,   // 風速→波高の係数（外洋より小さい）
    periodScale: 0.7,   // 波周期の係数
  },
  {
    name: '明石', lat: 34.6451, lon: 134.9983, note: '播磨灘・明石海峡',
    fetchScale: 0.50,   // 播磨灘: 内海のためやや小さい
    periodScale: 0.65,
  },
  {
    name: '南伊勢', lat: 34.3822, lon: 136.7111, note: '熊野灘・伊勢湾口',
    fetchScale: 0.85,   // 外洋に近いため係数大きめ
    periodScale: 0.9,
  },
];

const WMO_ICONS = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
  45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌧️',
  61:'🌧️',63:'🌧️',65:'🌧️',
  71:'❄️',73:'❄️',75:'❄️',
  80:'🌦️',81:'🌧️',82:'⛈️',
  95:'⛈️',96:'⛈️',99:'⛈️',
};

const WIND_DIRS = ['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
const degToDir = d => WIND_DIRS[Math.round(d/22.5)%16];
const degToArrow = d => ['↓','↙','←','↖','↑','↗','→','↘'][Math.round(((d+180)%360)/45)%8];

// 風速(m/s)から波高を推定する式（簡易Beaufort換算＋内海係数）
function estimateWave(windSpeed, scale) {
  // 基本式: H ≈ 0.025 * U^2 (外洋) を内海係数でスケール
  const raw = 0.025 * windSpeed * windSpeed;
  return Math.round(raw * scale * 10) / 10;
}

// 波高から波周期を推定（経験式）
function estimatePeriod(waveHeight, scale) {
  // T ≈ 4.4 * sqrt(H) の内海版
  const raw = 4.4 * Math.sqrt(Math.max(waveHeight, 0.1));
  return Math.round(raw * scale * 10) / 10;
}

function getCondition(wind, wave) {
  if (wind > 10 || wave > 2.0) return 'danger';
  if (wind > 6  || wave > 1.0) return 'caution';
  return 'good';
}
function getBadge(c) {
  if (c==='good')    return '<span class="condition-badge badge-good">良好</span>';
  if (c==='caution') return '<span class="condition-badge badge-caution">注意</span>';
  return '<span class="condition-badge badge-danger">危険</span>';
}
function getDayInfo(dateStr) {
  const days=['日','月','火','水','木','金','土'];
  const d = new Date(dateStr+'T00:00:00');
  return { name: days[d.getDay()], dow: d.getDay() };
}
function fmtDate(dateStr) {
  const d = new Date(dateStr+'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}

async function fetchSpotData(spotIdx) {
  const s = SPOTS[spotIdx];
  const base = `latitude=${s.lat}&longitude=${s.lon}&timezone=Asia%2FTokyo&forecast_days=14`;

  // 天気API（風・天気コード）は全ポイント共通で取得
  const weatherUrl = `https://api.open-meteo.com/v1/forecast?${base}`
    + `&daily=weather_code,wind_speed_10m_max,wind_direction_10m_dominant`
    + `&wind_speed_unit=ms`;

  // 海洋API（波高・波周期）を試みる
  const marineUrl = `https://marine-api.open-meteo.com/v1/marine?${base}`
    + `&daily=wave_height_max,wave_period_max`;

  try {
    const [wRes, mRes] = await Promise.all([
      fetch(weatherUrl),
      fetch(marineUrl)
    ]);

    if (!wRes.ok) return null;
    const wData = await wRes.json();
    if (wData.error) return null;

    // 海洋APIのレスポンスを確認
    let marineData = null;
    let marineAvailable = false;

    if (mRes.ok) {
      const mData = await mRes.json();
      // データが実際に入っているか確認（0以外の値があるか）
      if (!mData.error && mData.daily?.wave_height_max) {
        const nonZero = mData.daily.wave_height_max.some(v => v !== null && v > 0);
        if (nonZero) {
          marineData = mData;
          marineAvailable = true;
        }
      }
    }

    return { weather: wData, marine: marineData, marineAvailable };
  } catch(e) {
    console.error('fetch error:', e);
    return null;
  }
}

function buildPanel(spotIdx, data) {
  const spot = SPOTS[spotIdx];
  const panel = document.getElementById(`panel-${spotIdx}`);

  if (!data) {
    panel.innerHTML = `<div class="error-msg">
      ⚠ データの取得に失敗しました。<br>インターネット接続を確認してください。
    </div>`;
    return;
  }

  const daily = data.weather.daily;
  const marine = data.marine?.daily;
  const marineAvailable = data.marineAvailable;

  // 波データの取得または推定
  function getWaveH(i) {
    if (marineAvailable && marine?.wave_height_max?.[i] != null) {
      return marine.wave_height_max[i];
    }
    const wind = daily.wind_speed_10m_max?.[i] ?? 0;
    return estimateWave(wind, spot.fetchScale);
  }
  function getWaveP(i) {
    if (marineAvailable && marine?.wave_period_max?.[i] != null) {
      return marine.wave_period_max[i];
    }
    const wh = getWaveH(i);
    return estimatePeriod(wh, spot.periodScale);
  }

  const todayWind    = daily.wind_speed_10m_max?.[0] ?? 0;
  const todayWindDir = daily.wind_direction_10m_dominant?.[0] ?? 0;
  const todayWave    = getWaveH(0);
  const todayWaveP   = getWaveP(0);
  const todayCond    = getCondition(todayWind, todayWave);

  const condColor = { good:'#4be89a', caution:'#e8a84b', danger:'#e85a4b' };
  const condText  = { good:'出港推奨', caution:'要注意', danger:'出港危険' };

  // 推定値の場合は注意バナーを表示
  const noticeHTML = !marineAvailable ? `
    <div class="estimate-notice">
      ⚠ この海域はMarine APIの対象外のため、<strong>波高・波周期は風速からの推定値</strong>です。
      実際の海況は異なる場合があります。出港前に必ず気象庁や漁港の情報をご確認ください。
    </div>` : '';

  const currentHTML = `
    <div class="current-banner">
      <div class="current-item">
        <div class="current-label">本日の状況</div>
        <div class="current-value" style="color:${condColor[todayCond]};font-family:'Shippori Mincho',serif;font-size:16px;">${condText[todayCond]}</div>
      </div>
      <div class="current-item">
        <div class="current-label">最大風速</div>
        <div class="current-value">${todayWind.toFixed(1)}<span class="current-unit">m/s</span></div>
      </div>
      <div class="current-item">
        <div class="current-label">風向</div>
        <div class="current-value" style="font-size:15px;">${degToArrow(todayWindDir)} ${degToDir(todayWindDir)}</div>
      </div>
      <div class="current-item">
        <div class="current-label">${marineAvailable ? '最大波高' : '波高(推定)'}</div>
        <div class="current-value" style="${!marineAvailable?'color:#e8a84b':''}">${todayWave.toFixed(1)}<span class="current-unit">m</span></div>
      </div>
      <div class="current-item">
        <div class="current-label">${marineAvailable ? '波周期' : '波周期(推定)'}</div>
        <div class="current-value" style="${!marineAvailable?'color:#e8a84b':''}">${todayWaveP.toFixed(0)}<span class="current-unit">s</span></div>
      </div>
      <div class="current-item">
        <div class="current-label">海域</div>
        <div class="current-value" style="font-family:'Shippori Mincho',serif;font-size:12px;opacity:0.7;">${spot.note}</div>
      </div>
    </div>`;

  let gridHTML = '<div class="forecast-grid">';
  for (let i = 0; i < daily.time.length; i++) {
    const dateStr = daily.time[i];
    const { name: dayName, dow } = getDayInfo(dateStr);
    const icon = WMO_ICONS[daily.weather_code?.[i] ?? 0] ?? '🌤️';
    const windSpeed = daily.wind_speed_10m_max?.[i] ?? 0;
    const windDir   = daily.wind_direction_10m_dominant?.[i] ?? 0;
    const waveH = getWaveH(i);
    const waveP = getWaveP(i);
    const cond = getCondition(windSpeed, waveH);
    const wColor = { good:'#4be89a', caution:'#e8a84b', danger:'#e85a4b' }[cond];
    const mColor = waveH>2?'#e85a4b':waveH>1?'#e8a84b':'#5aace0';
    const dClass = dow===0?'sun':dow===6?'sat':'';

    gridHTML += `
      <div class="forecast-day ${cond}">
        <div class="day-date">${fmtDate(dateStr)}</div>
        <div class="day-name ${dClass}">${dayName}</div>
        <span class="weather-icon">${icon}</span>
        <div class="wind-value" style="color:${wColor}">${windSpeed.toFixed(1)}</div>
        <div class="wind-dir">${degToArrow(windDir)}${degToDir(windDir)}</div>
        <div class="wave-value" style="color:${mColor}">${waveH.toFixed(1)}m</div>
        <div class="wave-period">${waveP.toFixed(0)}s</div>
        ${!marineAvailable ? '<div class="wave-estimated">推定値</div>' : ''}
        ${getBadge(cond)}
      </div>`;
  }
  gridHTML += '</div>';

  panel.innerHTML = `
    ${currentHTML}
    ${noticeHTML}
    <div class="section-header">
      <div class="section-title">📅 14日間予報</div>
      <div class="section-line"></div>
    </div>
    <div class="forecast-scroll">${gridHTML}</div>
    <div class="info-bar">風速: m/s（日最大） ｜ 波高: m（日最大） ｜ 波周期: s</div>
    <div class="legend">
      <span class="legend-title">コンディション</span>
      <span class="legend-item"><span class="legend-dot" style="background:#4be89a"></span>良好 風≤6m/s 波≤1m</span>
      <span class="legend-item"><span class="legend-dot" style="background:#e8a84b"></span>注意 風≤10m/s 波≤2m</span>
      <span class="legend-item"><span class="legend-dot" style="background:#e85a4b"></span>危険 風>10m/s 波>2m</span>
    </div>
    <div class="api-note">データ提供: Open-Meteo / Marine API — 内海は風速から波高を推定</div>`;
}

async function loadAllData() {
  const now = new Date();
  document.getElementById('timestamp').textContent =
    `最終更新: ${now.toLocaleString('ja-JP')}`;
  const results = await Promise.all(SPOTS.map((_,i) => fetchSpotData(i)));
  results.forEach((data, i) => buildPanel(i, data));
}

function switchSpot(idx) {
  document.querySelectorAll('.spot-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.spot-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

loadAllData();
setInterval(loadAllData, 30*60*1000);
</script>

</body>
</html>
